<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kommunaløkonomi — noter og analyser</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --muted: #5a5a72;
      --accent: #c0392b;
      --paper: #f7f4ef;
      --rule: #ddd8d0;
    }

    html { font-size: 18px; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 3rem 2rem 1.5rem;
      max-width: 780px;
      margin: 0 auto;
    }

    .site-label {
      font-family: 'Source Serif 4', serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.15;
      color: var(--ink);
    }

    .tagline {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Nav ── */
    nav {
      max-width: 780px;
      margin: 0 auto;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }

    /* ── Main ── */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }

    /* ── Article card ── */
    article {
      padding: 2rem 0;
      border-bottom: 1px solid var(--rule);
    }

    article:last-child { border-bottom: none; }

    .meta {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .meta .tag {
      color: var(--accent);
      margin-right: 0.8rem;
    }

    article h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.7rem;
    }

    article h2 a {
      color: var(--ink);
      text-decoration: none;
      transition: color 0.2s;
    }

    article h2 a:hover { color: var(--accent); }

    .excerpt {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.65;
    }

    .read-more {
      display: inline-block;
      margin-top: 0.9rem;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .read-more:hover { border-color: var(--accent); }

    /* ── Empty state ── */
    .coming-soon {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
    }

    .coming-soon .ornament {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--rule);
      display: block;
      margin-bottom: 1rem;
    }

    .coming-soon p {
      font-style: italic;
      font-size: 1rem;
    }

    /* ── Footer ── */
    footer {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      border-top: 2px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <p class="site-label">kommune.astrup.org</p>
    <h1>Kommunaløkonomi</h1>
    <p class="tagline">Noter og analyser om det kommunale tilskuds- og udligningssystem</p>
  </header>

  <nav>
    <a href="/">Forside</a>
    <a href="/om">Om</a>
  </nav>

  <main>
    <p class="section-label">Seneste noter</p>

    <!-- Indsæt artikler herunder som <article>-blokke -->
    <!-- Eksempel på format:
    <article>
      <p class="meta"><span class="tag">Tilskud & udligning</span> 12. maj 2026</p>
      <h2><a href="/noter/artikelnavn.html">Artiklens titel</a></h2>
      <p class="excerpt">Kort resume af artiklen...</p>
      <a class="read-more" href="/noter/artikelnavn.html">Læs videre →</a>
    </article>
    -->

    <div class="coming-soon">
      <span class="ornament">§</span>
      <p>De første noter publiceres snart.</p>
    </div>

  </main>

  <footer>
    <span>kommune.astrup.org</span>
    <span><a href="https://astrup.org">astrup.org</a></span>
  </footer>

</body>
</html>
